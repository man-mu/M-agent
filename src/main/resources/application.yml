server:
  port: 8080

spring:
  application:
    name: deepresearch-mvp
  datasource:
    url: ${MVP_POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/manmu}
    username: ${MVP_POSTGRES_USER:manmu}
    password: ${MVP_POSTGRES_PASSWORD:manmu}
    driver-class-name: org.postgresql.Driver
  r2dbc:
    url: ${MVP_POSTGRES_R2DBC_URL:r2dbc:postgresql://localhost:5432/manmu}
    username: ${MVP_POSTGRES_USER:manmu}
    password: ${MVP_POSTGRES_PASSWORD:manmu}
  flyway:
    url: ${MVP_POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/manmu}
    user: ${MVP_POSTGRES_USER:manmu}
    password: ${MVP_POSTGRES_PASSWORD:manmu}
    locations: classpath:db/migration
  ai:
    dashscope:
      enabled: false
      chat:
        enabled: false

logging:
  level:
    top.lanshan.manmu: info

mvp:
  research:
    advanced-execution:
      enabled: false
      parallel-node-count:
        researcher: 2
        coder: 1
  search:
    bocha:
      endpoint: https://api.bochaai.com/v1/web-search
      api-key: ${BOCHA_API_KEY:}
      freshness: noLimit
      summary: true
      count: 5
      timeout-seconds: 30
  model:
    current:
      provider-id: dashscope
      model-name: qwen-turbo-2025-04-28
    providers:
      - provider-id: dashscope
        display-name: Alibaba DashScope
        models:
          - qwen-turbo-2025-04-28
          - qwen-plus
      - provider-id: deepseek
        display-name: DeepSeek
        base-url: https://api.deepseek.com
        models:
          - deepseek-chat
          - deepseek-reasoner
      - provider-id: minimax
        display-name: MiniMax
        base-url: https://api.minimax.io/v1
        models:
          - MiniMax-Text-01
      - provider-id: moonshot
        display-name: Moonshot AI
        base-url: https://api.moonshot.cn/v1
        models:
          - moonshot-v1-8k
          - moonshot-v1-32k
      - provider-id: zhipu
        display-name: Zhipu AI
        base-url: https://open.bigmodel.cn/api/paas/v4
        models:
          - glm-4
          - glm-4-flash
      - provider-id: yi
        display-name: 01.AI
        base-url: https://api.lingyiwanwu.com/v1
        models:
          - yi-lightning
