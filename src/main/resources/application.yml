server:
  port: 8080

spring:
  application:
    name: deepresearch-mvp
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  datasource:
    url: ${MVP_POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/manmu}
    username: ${MVP_POSTGRES_USER:manmu}
    password: ${MVP_POSTGRES_PASSWORD:manmu}
    driver-class-name: org.postgresql.Driver
  r2dbc:
    url: ${MVP_POSTGRES_R2DBC_URL:r2dbc:postgresql://localhost:5432/manmu}
    username: ${MVP_POSTGRES_USER:manmu}
    password: ${MVP_POSTGRES_PASSWORD:manmu}
  flyway:
    url: ${MVP_POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/manmu}
    user: ${MVP_POSTGRES_USER:manmu}
    password: ${MVP_POSTGRES_PASSWORD:manmu}
    locations: classpath:db/migration
  ai:
    dashscope:
      enabled: false
      chat:
        enabled: false

logging:
  level:
    top.lanshan.manmu: info

mvp:
  research:
    advanced-execution:
      parallel-node-count:
        researcher: 2
        coder: 1
  rag:
    enabled: true
    top-k: 5
    similarity-threshold: 0.3
    embedding:
      provider-id: dashscope
      model: text-embedding-v1
      dimensions: 1536
    professional-knowledge-bases:
      decision-enabled: true
      knowledge-bases:
        - id: java-api
          name: Java API 参考
          description: JDK 17 标准库及常用第三方库文档
          type: api
          enabled: true
          priority: 100
        - id: spring-docs
          name: Spring Boot 文档
          description: Spring Boot 3.x 官方参考和常见问题
          type: api
          enabled: true
          priority: 90
  mcp:
    enabled: true
    config-location: classpath:mcp-config.json
  skill:
    enabled: true
  search:
    bocha:
      endpoint: https://api.bochaai.com/v1/web-search
      api-key: ${BOCHA_API_KEY:}
      freshness: noLimit
      summary: true
      count: 5
      timeout-seconds: 30
  memory:
    conversation:
      enabled: true
      max-messages: 20
      max-message-characters: 800
    user-profile:
      enabled: true
      max-messages-for-extraction: 10
      cache-minutes: 60
      guide-reporter: true
  model:
    connect-timeout: 20s
    read-timeout: 180s
    current:
      provider-id: deepseek
      model-name: deepseek-chat
    providers:
      - provider-id: dashscope
        display-name: Alibaba DashScope
        models:
          - qwen3.7-max
          - qwen3.6-plus
          - qwen3.6-flash
          - qwen3-max
          - qwen-plus
          - qwen-flash
          - qwen-turbo-2025-04-28
      - provider-id: deepseek
        display-name: DeepSeek
        base-url: https://api.deepseek.com
        models:
          - deepseek-v4-flash
          - deepseek-v4-pro
          - deepseek-chat
          - deepseek-reasoner
      - provider-id: minimax
        display-name: MiniMax
        base-url: https://api.minimaxi.com/v1
        models:
          - MiniMax-M2.7
          - MiniMax-M2.7-highspeed
          - MiniMax-M2.5
          - MiniMax-M2.5-highspeed
          - MiniMax-M2.1
          - MiniMax-M2.1-lightning
          - MiniMax-M2
      - provider-id: moonshot
        display-name: Moonshot AI
        base-url: https://api.moonshot.ai/v1
        models:
          - kimi-k2.6
          - kimi-k2.5
          - moonshot-v1-8k
          - moonshot-v1-32k
          - moonshot-v1-128k
      - provider-id: zhipu
        display-name: Zhipu AI
        base-url: https://open.bigmodel.cn/api/paas/v4
        models:
          - glm-5.1
          - glm-5-turbo
          - glm-5
          - glm-4.7
          - glm-4.7-flash
          - glm-4.7-flashx
          - glm-4.6
          - glm-4.5-air
          - glm-4.5-airx
          - glm-4.5-flash
          - glm-4-flash-250414
          - glm-4-flashx-250414
      - provider-id: yi
        display-name: 01.AI
        base-url: https://api.lingyiwanwu.com/v1
        models:
          - yi-lightning
